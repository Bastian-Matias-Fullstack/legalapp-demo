<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso seguro | LexControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
</head>
<body>
    <!-- Video de fondo -->
    <video autoplay muted loop playsinline preload="auto" id="bg-video" poster="img/fondo-legal.jpg">
        <source src="videos/login-pingpong.mp4" type="video/mp4">
        Tu navegador no soporta video HTML5.
    </video>
    <div class="overlay"></div>

    <!--  Login Card -->

    <div class="login-container">
        <form id="loginForm">

            <div class="card login-card">
                <h2 class="login-title mb-4">
                    <img src="img/scales.svg" alt="Logo LexControl" class="icono-logo">
                    <span class="titulo-con-glow">LexControl</span>
                </h2>
                <p class="login-subtitle">Plataforma de gestión jurídica</p>
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" autocomplete="username">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>

                    <div class="password-field">
                        <input type="password"
                               id="password"
                               class="form-control password-input"
                               autocomplete="current-password">

                        <button type="button"
                                id="togglePassword"
                                class="toggle-password-btn"
                                aria-label="Mostrar contraseña"
                                aria-pressed="false"
                                title="Mostrar contraseña">
                            👁
                        </button>
                    </div>
                </div>

                <div class="mb-3">
                    <div id="mensajeError" class="alert alert-danger text-center py-2" style="display: none;"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>

                <p class="firma-dj">Desarrollado por Bastian Espinoza · 2025</p>
            </div>
        </form>

    </div>
    <!-- Pantalla de carga -->
    <div id="pantallaCarga" class="pantalla-carga d-none position-fixed top-0 start-0 w-100 h-100 d-flex flex-column justify-content-center align-items-center z-3">
        <div class="spinner-border text-info mb-3" role="status"></div>
        <h5 class="pantalla-carga-texto">Iniciando acceso seguro...</h5>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
